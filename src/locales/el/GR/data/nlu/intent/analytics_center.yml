version: "3.1"

nlu:
  - intent: list_hospitals
    examples: |
      - εμφάνισε νοσοκομεία
      - δείξε νοσοκομεία
      - ποια νοσοκομεία μπορώ να συγκρίνω;
      - ποια νοσοκομεία είναι διαθέσιμα;
      - εμφάνισε διαθέσιμους παρόχους
      - δείξε μου τη λίστα παρόχων
      - ποιους παρόχους μπορώ να συγκρίνω;
      - εμφάνισε νοσοκομεία για σύγκριση
      - δώσε μου τη λίστα νοσοκομείων
      - δείξε διαθέσιμα νοσοκομεία
      - δείξε νοσοκομεία στην [Ισπανία](country_code)
      - διαθέσιμα νοσοκομεία για [Μεξικό](country_code)
      - εμφάνισε νοσοκομεία για χώρα [DE](country_code)
      - δείξε τα επόμενα [20](limit) νοσοκομεία στην [ES](country_code)
      - εμφάνισε νοσοκομεία στις [ΗΠΑ](country_code)
      - δείξε νοσοκομεία στις [Ηνωμένες Πολιτείες](country_code)
      - εμφάνισε νοσοκομεία στον [Καναδά](country_code)
      - δείξε νοσοκομεία στο [Ηνωμένο Βασίλειο](country_code)
      - εμφάνισε νοσοκομεία στην [Αυστραλία](country_code)
      - δείξε νοσοκομεία στη [Γαλλία](country_code)
      - εμφάνισε νοσοκομεία στην [Ιαπωνία](country_code)
      - δείξε νοσοκομεία στην [Ισπανία](country_code) ταξινομημένα κατά [name](sort)
      - εμφάνισε νοσοκομεία με όνομα [General](hospital_name)
      - δείξε νοσοκομεία με όνομα [Memorial](hospital_name)
      - εμφάνισε νοσοκομεία, όριο [10](limit)
      - δείξε νοσοκομεία, μετατόπιση [50](offset)
      - εμφάνισε νοσοκομεία ταξινομημένα κατά [created_at](sort)
      - δείξε νοσοκομεία για ομάδα [25](group_id)

  - lookup: country_code
    examples: |
      - US
      - Ηνωμένες Πολιτείες
      - ΗΠΑ
      - USA
      - GB
      - Ηνωμένο Βασίλειο
      - UK
      - CA
      - Καναδάς
      - AU
      - Αυστραλία
      - DE
      - Γερμανία
      - FR
      - Γαλλία
      - ES
      - Ισπανία
      - MX
      - Μεξικό
      - JP
      - Ιαπωνία

  - synonym: US
    examples: |
      - Ηνωμένες Πολιτείες
      - ΗΠΑ
      - USA
      - US

  - synonym: GB
    examples: |
      - Ηνωμένο Βασίλειο
      - UK
      - GB

  - synonym: CA
    examples: |
      - Καναδάς
      - CA

  - synonym: AU
    examples: |
      - Αυστραλία
      - AU

  - synonym: DE
    examples: |
      - Γερμανία
      - DE

  - synonym: FR
    examples: |
      - Γαλλία
      - FR

  - synonym: ES
    examples: |
      - Ισπανία
      - ES

  - synonym: MX
    examples: |
      - Μεξικό
      - MX

  - synonym: JP
    examples: |
      - Ιαπωνία
      - JP

  - regex: limit
    examples: |
      - \b(?:[1-9]\d{0,2})\b

  - regex: offset
    examples: |
      - \b(?:0|[1-9]\d{0,4})\b
