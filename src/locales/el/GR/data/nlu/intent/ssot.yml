version: "3.1"

nlu:
  - intent: faq_ssot_help
    examples: |
      - Τι είδους κλινικές έννοιες μπορείς να εξηγήσεις;
      - Ποιο λεξικό δεδομένων ή SSOT χρησιμοποιείς;
      - Ποιοι είναι οι τύποι μετρικών, εγκεφαλικών και γραφημάτων σου;
      - Για ποιους δομημένους τύπους μπορώ να σε ρωτήσω;
      - Πες μου για τις έννοιες πίσω από τα KPI και τα φίλτρα σου.

  - intent: faq_metric_types
    examples: |
      - Για ποιες μετρικές ή KPI μπορώ να ρωτήσω;
      - Εξήγησε τους τύπους μετρικών.
      - Τι σημαίνει εδώ ο τύπος μετρικής;
      - Τι είδους μετρικές εγκεφαλικού παρακολουθείτε;
      - Τι αντιπροσωπεύει ένα KPI όπως το DTN ή το DIDO;

  - intent: faq_stroke_types
    examples: |
      - Ποιους τύπους εγκεφαλικού υποστηρίζετε;
      - Ποιοι υποτύποι εγκεφαλικού υπάρχουν στα δεδομένα σας;
      - Εξήγησε τις κατηγορίες τύπων εγκεφαλικού.
      - Τι εννοείς με ισχαιμικό ή αιμορραγικό εγκεφαλικό;

  - intent: faq_chart_types
    examples: |
      - Τι είδη γραφημάτων μπορείς να δείξεις;
      - Τι είδη οπτικοποιήσεων είναι διαθέσιμα;
      - Εξήγησε τους τύπους γραφημάτων που υποστηρίζεις.
      - Υποστηρίζεις γραφήματα γραμμής, ράβδων ή πίτας;

  - intent: faq_group_by_types
    examples: |
      - Με τι μπορώ να ομαδοποιήσω τα δεδομένα;
      - Ποιες διαστάσεις ομαδοποίησης υποστηρίζετε;
      - Εξήγησε τις επιλογές ομαδοποίησης.
      - Ποια είναι τα βασικά πεδία ομαδοποίησης;

  - intent: faq_statistical_test_types
    examples: |
      - Ποιες στατιστικές δοκιμές μπορείς να εκτελέσεις;
      - Εξήγησε τους τύπους στατιστικών δοκιμών που υποστηρίζεις.
      - Ποιες δοκιμές υποθέσεων είναι διαθέσιμες;
      - Ποιες μεθόδους συσχέτισης ή παλινδρόμησης έχετε;

  - intent: faq_operator_types
    examples: |
      - Ποιους τελεστές σύγκρισης μπορώ να χρησιμοποιήσω στα φίλτρα;
      - Εξήγησε τελεστές όπως μεγαλύτερο ή ίσο.
      - Τι σημαίνουν τα GE και LE;
      - Ποιοι σχεσιακοί τελεστές υποστηρίζονται;

  - intent: faq_sex_types
    examples: |
      - Πώς κατηγοριοποιείτε το φύλο στα δεδομένα;
      - Ποιες κατηγορίες φύλου υποστηρίζετε;
      - Εξήγησε τους βιολογικούς τύπους φύλου που χρησιμοποιείτε.

  - intent: faq_boolean_types
    examples: |
      - Τι είδους δείκτες ναι/όχι παρακολουθείτε;
      - Εξήγησε τους δυαδικούς τύπους σας.
      - Ποιοι δυαδικοί δείκτες είναι διαθέσιμοι στα δεδομένα;

  - intent: ask_metric_definition
    examples: |
      - Τι είναι το [DTN](metric);
      - Μπορείς να εξηγήσεις το [AA_DTN_LE60](metric);
      - Τι σημαίνει η μετρική [ONSET_TO_DOOR](metric);
      - Περιέγραψε το KPI [HOSPITAL_STAY](metric).
      - Τι αντιπροσωπεύει το [AGE](metric) στα δεδομένα σας;
      - Εξήγησε τη μετρική [DIDO](metric).
      - Ποιος είναι ο ορισμός του [ADMISSION_NIHSS](metric);
