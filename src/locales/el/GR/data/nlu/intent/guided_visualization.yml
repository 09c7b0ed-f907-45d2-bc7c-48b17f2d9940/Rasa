version: "3.1"

nlu:
  - intent: request_guided_visualization
    examples: |
      - ναι
      - ναι παρακαλώ
      - βεβαίως
      - εντάξει
      - πάμε
      - βοήθησέ με να φτιάξω ένα γράφημα
      - καθοδήγησέ με για να δημιουργήσω ένα γράφημα
      - δείξε μου τη διαδικασία βήμα βήμα
      - βοήθησέ με να φτιάξω μια οπτικοποίηση
      - μπορείς να με καθοδηγήσεις βήμα βήμα

  - intent: request_freeform_visualization
    examples: |
      - θα το περιγράψω μόνος μου
      - άσε με να γράψω το αίτημα
      - θέλω να το κάνω ελεύθερα
      - θα σου πω απλώς τι θέλω
      - θα το γράψω σε ένα μήνυμα

  - intent: cancel_guided_visualization
    examples: |
      - άλλαξε σε ελεύθερη λειτουργία
      - άλλαξε σε λειτουργία ενός μηνύματος
      - βγες από την καθοδηγούμενη λειτουργία
      - σταμάτα την καθοδηγούμενη λειτουργία
      - ακύρωσε την καθοδηγούμενη ροή
      - ακύρωσε τον καθοδηγούμενο τρόπο

  - intent: skip_guided_step
    examples: |
      - παράλειψη
      - παράλειψέ το
      - όχι
      - όχι ευχαριστώ
      - όχι τώρα
      - ίσως αργότερα
      - χωρίς φίλτρο
      - κανένα
      - άφησέ το κενό
